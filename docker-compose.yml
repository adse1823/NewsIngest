version: "3.8"

services:
  redpanda:
    image: redpandadata/redpanda:v23.3.11
    container_name: redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:29092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:29092
      - --schema-registry-addr http://0.0.0.0:8081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --smp 1
      - --memory 512M
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --check=false
    ports:
      - "29092:29092"
      - "8081:8081"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9644/v1/cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  spark-master:
    image: apache/spark:3.5.0
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      - SPARK_NO_DAEMONIZE=true
      - REDPANDA_BROKERS=redpanda:9092
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - .:/opt/spark-app
      - spark-ivy:/tmp/.ivy2
    profiles:
      - spark

  spark-worker:
    image: apache/spark:3.5.0
    container_name: spark-worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_WORKER_MEMORY=1g
      - SPARK_WORKER_CORES=2
    depends_on:
      - spark-master
    volumes:
      - .:/opt/spark-app
    profiles:
      - spark

  spark-streaming:
    image: apache/spark:3.5.0
    container_name: spark-streaming
    command:
      - /opt/spark/bin/spark-submit
      - --master
      - spark://spark-master:7077
      - --conf
      - spark.jars.ivy=/tmp/.ivy2
      - --packages
      - org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1,org.apache.spark:spark-avro_2.12:3.5.1
      - /opt/spark-app/streaming/spark_consumer.py
    environment:
      - REDPANDA_BROKERS=redpanda:9092
      - SCHEMA_REGISTRY_URL=http://redpanda:8081
      - CHECKPOINT_DIR=/opt/spark-app/data/checkpoints
    depends_on:
      - spark-master
      - redpanda
    volumes:
      - .:/opt/spark-app
      - spark-ivy:/tmp/.ivy2
    profiles:
      - spark

  serving-api:
    build:
      context: .
      dockerfile: serving/Dockerfile
    container_name: serving-api
    ports:
      - "8000:8000"
    environment:
      - MLRUNS_DIR=/app/mlruns
    volumes:
      - ./mlruns:/app/mlruns
      - ./data:/app/data
    profiles:
      - serving

  airflow-init:
    image: apache/airflow:2.9.1
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init &&
        airflow users create --username admin --password admin --firstname Admin --lastname Admin --role Admin --email admin@example.com
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow-data:/opt/airflow
      - .:/opt/airflow/project
    profiles:
      - airflow

  airflow-webserver:
    image: apache/airflow:2.9.1
    container_name: airflow-webserver
    command: webserver
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    ports:
      - "8888:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow-data:/opt/airflow
      - .:/opt/airflow/project
    depends_on:
      - airflow-init
    profiles:
      - airflow

  airflow-scheduler:
    image: apache/airflow:2.9.1
    container_name: airflow-scheduler
    command: scheduler
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow-data:/opt/airflow
      - .:/opt/airflow/project
    depends_on:
      - airflow-init
    profiles:
      - airflow

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboard.json:/var/lib/grafana/dashboards/fin-platform.json
    depends_on:
      - prometheus
    profiles:
      - monitoring

volumes:
  grafana-storage:
  spark-ivy:
  airflow-data:
